<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Movie Listing Website</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>🎬 Movie Listing</h1>

        <input type="text" id="search" placeholder="Search movies...">

    </header>


    <section class="movie-container" id="movieContainer">

        <div class="movie-card">
            <img src="images/movie1.jpg" alt="Avengers Endgame">

            <div class="movie-info">
                <h3>Avengers Endgame</h3>
                <p>Genre: Action / Sci-Fi</p>
                <p>Year: 2019</p>

                <div class="rating">
                    ⭐⭐⭐⭐☆
                </div>
            </div>

        </div>



        <div class="movie-card">
            <img src="images/movie2.jpg" alt="Interstellar">

            <div class="movie-info">
                <h3>Interstellar</h3>
                <p>Genre: Sci-Fi</p>
                <p>Year: 2014</p>

                <div class="rating">
                    ⭐⭐⭐⭐⭐
                </div>

            </div>
        </div>



        <div class="movie-card">
            <img src="images/movie3.jpg" alt="Joker">

            <div class="movie-info">
                <h3>Joker</h3>
                <p>Genre: Drama</p>
                <p>Year: 2019</p>

                <div class="rating">
                    ⭐⭐⭐⭐☆
                </div>

            </div>
        </div>


    </section>

    <script src="script.js"></script>

</body>

</html>
